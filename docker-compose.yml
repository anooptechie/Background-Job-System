version: "3.9"

services:

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: npm run dev:server
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  worker:
    build: .
    command: npm run dev:worker
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis